<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>英文單字卡</title>

<style>
body{
    font-family:sans-serif;
    padding:20px;
}

.top-bar{
    margin-bottom:20px;
}

#inputBox{
    width:300px;
    padding:10px;
    font-size:20px;
    margin-right:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:15px;
}

.card{
    width:150px;
    height:100px;
    perspective:1000px;
}

.inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform 0.6s;
    transform-style:preserve-3d;
}

.card.flipped .inner{
    transform:rotateY(180deg);
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    border:1px solid #333;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    backface-visibility:hidden;
}

.front{
    background:#f2f2f2;
}

.back{
    background:#d0f0ff;
    transform:rotateY(180deg);
}
</style>
</head>

<body>

<h2>英文單字卡</h2>

<div class="top-bar">

    <input id="inputBox" placeholder="輸入英文">

    <label>
        <input type="radio" name="mode" value="includes" checked>
        模式1：任意配
    </label>

    <label>
        <input type="radio" name="mode" value="startsWith">
        模式2：開頭配
    </label>

    <label>
        <input type="radio" name="mode" value="exact">
        模式3：完整配
    </label>

</div>

<div class="cards" id="cards"></div>

<script>
const words = [
    { zh:"蘋果", en:"apple" },
    { zh:"香蕉", en:"banana" },
    { zh:"貓", en:"cat" },
    { zh:"狗", en:"dog" },
    { zh:"書", en:"book" },
    { zh:"水", en:"water" },
    { zh:"電腦", en:"computer" },
    { zh:"手機", en:"phone" },
    { zh:"太陽", en:"sun" },
    { zh:"月亮", en:"moon" }
];

const cardsDiv = document.getElementById("cards");

words.forEach((word, index) => {

    const card = document.createElement("div");

    card.className = "card";
    card.id = "card-" + index;

    card.innerHTML = `
        <div class="inner">
            <div class="front">${word.zh}</div>
            <div class="back">${word.en}</div>
        </div>
    `;

    cardsDiv.appendChild(card);
});

const inputBox = document.getElementById("inputBox");
const modeRadios = document.querySelectorAll('input[name="mode"]');

function updateCards(){

    const text = inputBox.value.toLowerCase().trim();

    const mode = document.querySelector('input[name="mode"]:checked').value;

    words.forEach((word, index) => {

        const card = document.getElementById("card-" + index);

        let matched = false;

        if(text !== ""){

            if(mode === "includes"){

                // 模式1：任意配
                matched = word.en.includes(text);

            }else if(mode === "startsWith"){

                // 模式2：開頭配
                matched = word.en.startsWith(text);

            }else if(mode === "exact"){

                // 模式3：完整配
                matched = word.en === text;
            }
        }

        if(matched){
            card.classList.add("flipped");
        }else{
            card.classList.remove("flipped");
        }
    });
}

inputBox.addEventListener("input", updateCards);

modeRadios.forEach(radio => {
    radio.addEventListener("change", updateCards);
});
</script>

</body>
</html>
