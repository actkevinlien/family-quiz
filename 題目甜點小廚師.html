<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我是甜點小廚師 - 趣味測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'chef-pink': '#FF85A1',
                        'chef-yellow': '#FFD93D',
                        'chef-blue': '#6EB5FF',
                        'chef-green': '#9ADE7B',
                        'chef-cream': '#FFF9F0',
                        'chef-orange': '#FF9F66',
                    },
                    fontFamily: {
                        display: ['"ZCOOL KuaiLe"', 'cursive'],
                        body: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'sweet': '0 10px 25px -5px rgba(255, 133, 161, 0.3)',
                        'bubble': '0 8px 0px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FFF9F0;
            background-image: radial-gradient(#FFD93D 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid #ffffff;
        }

        .option-card input[type="radio"]:checked + div {
            background-color: #FF85A1;
            color: white;
            transform: scale(1.02);
            border-color: #FF85A1;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.4);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .character-spacing {
            letter-spacing: 0.05em;
        }

        .rounded-big {
            border-radius: 2.5rem;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header Section -->
    <header class="relative pt-12 pb-8 px-4 text-center overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <div class="inline-block bg-chef-pink text-white px-6 py-2 rounded-full text-lg font-bold mb-4 shadow-lg character-spacing">
                🍰 甜點學院測驗
            </div>
            <h1 class="font-display text-5xl md:text-7xl text-chef-orange drop-shadow-sm mb-4 floating">
                我是甜點小廚師
            </h1>
            <p class="text-gray-600 text-lg md:text-xl font-bold max-w-lg mx-auto leading-relaxed">
                小朋友，準備好挑戰成為超厲害的甜點大師了嗎？<br>點選正確的答案，讓我們一起動手做！
            </p>
        </div>
        
        <!-- Decorative Shapes -->
        <div class="absolute top-0 left-0 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-chef-yellow opacity-20 rounded-full blur-3xl"></div>
        <div class="absolute top-20 right-0 translate-x-1/3 w-48 h-48 bg-chef-blue opacity-20 rounded-full blur-3xl"></div>
    </header>

    <!-- Progress Bar (Sticky) -->
    <div class="sticky top-4 z-50 px-4 mb-8">
        <div class="max-w-2xl mx-auto bg-white/80 backdrop-blur-md p-3 rounded-full shadow-lg border-2 border-chef-pink/20">
            <div class="flex justify-between items-center px-4 mb-1">
                <span class="text-chef-pink font-black text-sm">小廚師成長度</span>
                <span id="progress-text" class="text-chef-pink font-black text-sm">0 / 20</span>
            </div>
            <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden p-1">
                <div id="progress-bar" class="bg-chef-pink h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-2xl mx-auto px-4 space-y-12">
        
        <!-- Question Template Generator -->
        <script>
            const questions = [
                { q: "當一個甜點小廚師，開始做蛋糕之前，第一件要做的事情是什麼呢？", options: ["A. 睡覺", "B. 洗洗手", "C. 玩玩具"] },
                { q: "為了不讓衣服弄髒，小廚師應該穿上什麼呢？", options: ["A. 圍裙", "B. 雨鞋", "C. 披風"] },
                { q: "做蛋糕的時候，哪一種白色的粉末是主要的材料呢？", options: ["A. 鹽巴", "B. 麵粉", "C. 洗衣粉"] },
                { q: "哪一種材料圓圓的，敲開殼之後會有黃黃的蛋黃呢？", options: ["A. 雞蛋", "B. 蘋果", "C. 巧克力糖"] },
                { q: "如果想讓甜點吃起來甜甜的，小廚師要加入什麼呢？", options: ["A. 辣椒粉", "B. 醋", "C. 砂糖"] },
                { q: "要把麵粉、雞蛋和牛奶攪拌均勻，我們會用到哪種工具？", options: ["A. 剪刀", "B. 攪拌棒", "C. 梳子"] },
                { q: "哪一種液體白白的，喝起來很香，也可以加進蛋糕裡？", options: ["A. 牛奶", "B. 汽水", "C. 醬油"] },
                { q: "要把蛋糕烤得香噴噴，要放進哪一個熱熱的機器裡呢？", options: ["A. 冰箱", "B. 烤箱", "C. 洗衣機"] },
                { q: "烤箱正在工作的時候，小廚師可以去摸烤箱嗎？", options: ["A. 可以，因為很好玩", "B. 不可以，因為會燙傷", "C. 可以，因為烤箱不熱"] },
                { q: "蛋糕烤好之後，聞起來會是什麼味道呢？", options: ["A. 臭臭的味道", "B. 香噴噴的味道", "C. 酸酸的味道"] },
                { q: "如果想在蛋糕上面裝飾漂亮的紅顏色，可以用哪種水果？", options: ["A. 草莓", "B. 葡萄", "C. 奇異果"] },
                { q: "我們可以用什麼工具把鮮奶油擠成一朵花？", options: ["A. 擠花袋", "B. 湯匙", "C. 叉子"] },
                { q: "如果要做「巧克力餅乾」，一定要準備哪種材料？", options: ["A. 苦瓜", "B. 巧克力", "C. 青椒"] },
                { q: "做甜點時，如果需要用到小刀切水果，應該怎麼辦？", options: ["A. 自己趕快拿來切", "B. 請老師或爸爸媽媽幫忙", "C. 閉著眼睛切"] },
                { q: "哪一種甜點長得圓圓的，中間還有一個洞呢？", options: ["A. 甜甜圈", "B. 三明治", "C. 包子"] },
                { q: "做好的布丁軟綿綿的，要放進哪裡冰冰的才會變好吃？", options: ["A. 烤箱", "B. 冰箱", "C. 書櫃"] },
                { q: "當小廚師在攪拌材料的時候，身體要怎麼坐才安全？", options: ["A. 站在椅子上跳", "B. 坐好在位子上", "C. 躺在地上攪拌"] },
                { q: "如果你想做一個黃色的甜點，可以加入哪種水果？", options: ["A. 藍莓", "B. 芒果", "C. 西瓜"] },
                { q: "甜點做好了，要分享給小朋友吃之前，我們應該說什麼？", options: ["A. 大家請慢用", "B. 通通不准吃", "C. 我要全部吃光"] },
                { q: "當甜點小廚師工作結束後，桌子髒髒的該怎麼辦？", options: ["A. 直接走掉去玩", "B. 把桌子 and 工具收乾淨", "C. 把垃圾丟到地上"] }
            ];

            const colors = ['border-chef-blue', 'border-chef-yellow', 'border-chef-pink', 'border-chef-green', 'border-chef-orange'];

            document.write(questions.map((item, index) => {
                const colorClass = colors[index % colors.length];
                return `
                <section class="glass-card rounded-big p-6 md:p-8 shadow-sweet border-t-8 ${colorClass} transition-all duration-300 transform hover:-translate-y-1">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="flex-shrink-0 w-10 h-10 bg-chef-yellow text-chef-orange font-black flex items-center justify-center rounded-full text-xl shadow-sm">
                            ${index + 1}
                        </span>
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-800 leading-snug character-spacing">
                            ${item.q}
                        </h2>
                    </div>
                    
                    <div class="space-y-4">
                        ${item.options.map((opt, i) => `
                            <label class="option-card block cursor-pointer group">
                                <input type="radio" name="q${index}" value="${i}" class="hidden" onchange="updateProgress()">
                                <div class="bg-white border-2 border-gray-100 p-5 rounded-3xl flex items-center gap-4 text-xl font-bold text-gray-700 transition-all duration-200 group-hover:border-chef-pink/50 group-hover:bg-pink-50">
                                    <span class="w-8 h-8 rounded-full border-2 border-gray-200 flex items-center justify-center group-hover:border-chef-pink text-sm">
                                        ${String.fromCharCode(65 + i)}
                                    </span>
                                    ${opt.split('. ')[1]}
                                </div>
                            </label>
                        `).join('')}
                    </div>
                </section>
                `;
            }).join(''));

            function updateProgress() {
                const total = questions.length;
                const answered = document.querySelectorAll('input[type="radio"]:checked').length;
                const percentage = (answered / total) * 100;
                
                document.getElementById('progress-bar').style.width = percentage + '%';
                document.getElementById('progress-text').innerText = `${answered} / ${total}`;

                if (answered === total) {
                    document.getElementById('submit-area').classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            }
        </script>

        <!-- Final Button Area -->
        <div id="submit-area" class="hidden text-center py-12">
            <div class="bg-white p-8 rounded-big shadow-sweet border-4 border-dashed border-chef-pink mb-8">
                <p class="text-4xl mb-4">🏆</p>
                <h3 class="text-3xl font-black text-chef-pink mb-4">太棒了！小廚師！</h3>
                <p class="text-gray-600 font-bold mb-8">你已經完成了所有題目，準備好接受表揚了嗎？</p>
                <button onclick="alert('恭喜你成為三星級甜點小廚師！🌟🌟🌟')" class="bg-chef-pink hover:bg-chef-orange text-white text-2xl font-black px-12 py-5 rounded-full shadow-lg transition-all transform hover:scale-110 active:scale-95 character-spacing">
                    領取小廚師獎章
                </button>
            </div>
        </div>

    </main>

    <!-- Floating Decor -->
    <div class="fixed bottom-6 right-6 pointer-events-none opacity-40 md:opacity-100">
        <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-chef-yellow transform rotate-12">
            <span class="text-4xl">👨‍🍳</span>
        </div>
    </div>
    <div class="fixed bottom-10 left-6 pointer-events-none opacity-40 md:opacity-100">
        <div class="bg-white p-4 rounded-3xl shadow-xl border-4 border-chef-blue transform -rotate-12">
            <span class="text-4xl">🧁</span>
        </div>
    </div>

</body>
</html>
